<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="Animated cyber security operator console">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050807"/>
      <stop offset="0.5" stop-color="#07130f"/>
      <stop offset="1" stop-color="#020403"/>
    </linearGradient>
    <radialGradient id="radarGlow">
      <stop offset="0" stop-color="#39ff88" stop-opacity=".28"/>
      <stop offset="1" stop-color="#39ff88" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#39ff88" stroke-opacity=".08"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="terminalClip"><rect x="62" y="98" width="700" height="272" rx="10"/></clipPath>
  </defs>

  <style>
    .mono { font-family: "Courier New", ui-monospace, monospace; }
    .green { fill: #79ffa8; }
    .dim { fill: #3c8e5d; }
    .tiny { font-size: 13px; letter-spacing: 1.5px; }
    .line { opacity: 0; animation: reveal .25s forwards; }
    .l1 { animation-delay: .3s } .l2 { animation-delay: .8s }
    .l3 { animation-delay: 1.3s } .l4 { animation-delay: 1.8s }
    .l5 { animation-delay: 2.3s } .l6 { animation-delay: 2.8s }
    .l7 { animation-delay: 3.3s } .l8 { animation-delay: 3.8s }
    .cursor { animation: blink .85s steps(1) infinite; }
    .scan { animation: scan 5s linear infinite; }
    .sweep { transform-origin: 970px 235px; animation: sweep 4s linear infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .packet { animation: packet 3.2s linear infinite; }
    .packet2 { animation-delay: 1.1s }
    .packet3 { animation-delay: 2.2s }
    @keyframes reveal { to { opacity: 1 } }
    @keyframes blink { 50% { opacity: 0 } }
    @keyframes scan { from { transform: translateY(-30px) } to { transform: translateY(460px) } }
    @keyframes sweep { to { transform: rotate(360deg) } }
    @keyframes pulse { 50% { opacity: .25; r: 8px } }
    @keyframes packet { from { transform: translateX(0); opacity:0 } 15%{opacity:1} 85%{opacity:1} to { transform: translateX(235px); opacity:0 } }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
    }
  </style>

  <rect width="1200" height="430" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="18" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="428" rx="17" fill="none" stroke="#39ff88" stroke-opacity=".35"/>

  <g class="mono">
    <text x="34" y="42" class="green" font-size="15" letter-spacing="3">OPERATOR CONSOLE // SECURE CHANNEL</text>
    <text x="1165" y="42" class="dim tiny" text-anchor="end">NODE: GITHUB</text>
    <circle cx="27" cy="37" r="5" fill="#39ff88" class="pulse"/>
    <path d="M34 62H1166" stroke="#39ff88" stroke-opacity=".28"/>

    <rect x="46" y="82" width="732" height="306" rx="13" fill="#020504" stroke="#39ff88" stroke-opacity=".25"/>
    <circle cx="66" cy="101" r="4" fill="#ff5f57"/>
    <circle cx="82" cy="101" r="4" fill="#febc2e"/>
    <circle cx="98" cy="101" r="4" fill="#28c840"/>

    <g clip-path="url(#terminalClip)">
      <text x="68" y="137" class="mono green line l1" font-size="18">$ ./initialize_operator --identity ICHYABOY</text>
      <text x="68" y="169" class="mono dim line l2" font-size="16">[+] Loading offensive-security modules...</text>
      <text x="68" y="198" class="mono green line l3" font-size="16">[OK] Web exploitation / Active Directory / Network</text>
      <text x="68" y="227" class="mono green line l4" font-size="16">[OK] Medical device security / BLE / EN 18031</text>
      <text x="68" y="256" class="mono dim line l5" font-size="16">[*] Current objective: build, break, document, improve.</text>
      <text x="68" y="294" class="mono green line l6" font-size="16">root@github:~# whoami</text>
      <text x="68" y="323" class="mono green line l7" font-size="16">penetration_tester | security_researcher | builder</text>
      <text x="68" y="352" class="mono green line l8" font-size="16">root@github:~# <tspan class="cursor">█</tspan></text>
    </g>

    <g>
      <circle cx="970" cy="235" r="132" fill="url(#radarGlow)" stroke="#39ff88" stroke-opacity=".18"/>
      <circle cx="970" cy="235" r="100" fill="none" stroke="#39ff88" stroke-opacity=".24"/>
      <circle cx="970" cy="235" r="65" fill="none" stroke="#39ff88" stroke-opacity=".24"/>
      <circle cx="970" cy="235" r="30" fill="none" stroke="#39ff88" stroke-opacity=".24"/>
      <path d="M838 235H1102M970 103V367" stroke="#39ff88" stroke-opacity=".18"/>
      <path class="sweep" d="M970 235L970 103A132 132 0 0 1 1063 142Z" fill="#39ff88" fill-opacity=".18"/>
      <circle cx="1037" cy="184" r="4" fill="#79ffa8" filter="url(#glow)" class="pulse"/>
      <circle cx="908" cy="274" r="4" fill="#79ffa8" filter="url(#glow)" class="pulse"/>
      <circle cx="1012" cy="302" r="4" fill="#79ffa8" filter="url(#glow)" class="pulse"/>
      <text x="970" y="397" text-anchor="middle" class="dim tiny">ATTACK SURFACE MAPPING</text>
    </g>

    <g transform="translate(825 70)">
      <path d="M0 0H270" stroke="#39ff88" stroke-opacity=".2"/>
      <circle cx="8" cy="0" r="3" fill="#79ffa8" class="packet"/>
      <circle cx="8" cy="0" r="3" fill="#79ffa8" class="packet packet2"/>
      <circle cx="8" cy="0" r="3" fill="#79ffa8" class="packet packet3"/>
    </g>

    <rect class="scan" x="0" y="-20" width="1200" height="32" fill="#39ff88" opacity=".025"/>
  </g>
</svg>
